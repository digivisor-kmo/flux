<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FLUX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --ink: #2A2118;
    --muted: #A2947A;
    --line: rgba(42,33,24,0.14);
    --c0: #2E9E90; --c1: #F0654A; --c2: #F3B43A;   /* getunede, warm-belichte triade */
    --accent: #F0654A;
    --glyph: rgba(255,255,255,0.94);
    --sh: 74,52,30;   /* warme schaduwtint */
    --font: "Bricolage Grotesque", system-ui, sans-serif;
    --mono: "Space Mono", ui-monospace, monospace;
  }

  html, body { height: 100%; }
  body {
    color: var(--ink);
    font-family: var(--font);
    display: flex; justify-content: center; min-height: 100dvh;
    overflow-x: hidden; position: relative;
    /* verlicht papieroppervlak: warme lichtbron linksboven */
    background:
      radial-gradient(120% 85% at 26% 8%, #F5EDDA 0%, #ECE1C9 44%, #E3D6B9 76%, #D9C9A9 100%);
  }
  /* papierkorrel */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.55;
    mix-blend-mode: multiply;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='p'><feTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='2'/></filter><rect width='200' height='200' filter='url(%23p)' opacity='0.05'/></svg>");
  }
  /* zachte vignet */
  body::after {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(130% 100% at 50% 40%, transparent 55%, rgba(60,44,24,0.10) 100%);
  }

  .app {
    width: 100%; max-width: 420px; z-index: 1; position: relative;
    padding: 22px 26px 30px;
    display: flex; flex-direction: column; min-height: 100dvh;
  }

  /* ---- top bar (rustig) ---- */
  .topbar { display: flex; align-items: center; justify-content: space-between; }
  .wordmark { font-weight: 800; font-size: 21px; letter-spacing: -0.03em; }
  .wordmark .dot { color: var(--accent); }
  .icon {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; gap: 2px;
    background: rgba(255,255,255,0.35);
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow: 0 2px 5px rgba(var(--sh),0.14), inset 0 1px 0 rgba(255,255,255,0.7);
    cursor: pointer; transition: transform 0.18s ease;
  }
  .icon:active { transform: scale(0.94); }
  .icon i { width: 5px; height: 5px; display: block; background: var(--muted); }
  .icon i:nth-child(1) { clip-path: polygon(50% 0, 100% 100%, 0 100%); }
  .icon i:nth-child(2) { border-radius: 50%; }
  .icon i:nth-child(3) { border-radius: 1px; }
  .show-glyph .icon { background: var(--ink); border-color: var(--ink); }
  .show-glyph .icon i { background: #F0E7D4; }

  /* ---- subhead ---- */
  .subhead {
    text-align: center; font-family: var(--mono); font-size: 10.5px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
    margin-top: 26px;
  }
  .goalline {
    text-align: center; margin-top: 10px; margin-bottom: 4px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .goalline .t { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  .goalline .sw {
    width: 18px; height: 18px; border-radius: 4px; background: var(--c0); position: relative; overflow: hidden;
    box-shadow: 0 2px 3px rgba(var(--sh),0.28), inset 1px 1px 0 rgba(255,255,255,0.3);
  }
  .goalline .sw::before { content:""; position:absolute; inset:0;
    background: linear-gradient(135deg, rgba(255,255,255,0.30) 0%, rgba(255,255,255,0.55) 49.4%, rgba(0,0,0,0.06) 50.4%, rgba(0,0,0,0.15) 100%); }

  /* ---- board (held) ---- */
  .stage { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
  .board-wrap { position: relative; width: 100%; }
  /* grondschaduw onder het bord */
  .board-wrap::before {
    content: ""; position: absolute; left: 8%; right: 8%; bottom: -14px; height: 44px;
    background: radial-gradient(50% 100% at 50% 0, rgba(var(--sh),0.20), transparent 72%);
    filter: blur(4px);
  }
  .board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 13px; aspect-ratio: 1; position: relative; }

  .tile {
    aspect-ratio: 1; border-radius: 7%; border: none; cursor: pointer;
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    transform-origin: center;
    box-shadow:
      0 9px 15px -5px rgba(var(--sh),0.32),
      0 3px 5px -1px rgba(var(--sh),0.22),
      inset 1.5px 1.5px 0 rgba(255,255,255,0.32),
      inset -1.5px -1.5px 0 rgba(0,0,0,0.10);
    transition: background-color 0.30s cubic-bezier(0.22,0.61,0.36,1);
    will-change: transform;
  }
  .tile:focus-visible { outline: 3px solid var(--ink); outline-offset: 3px; }
  .tile.s0 { background: var(--c0); } .tile.s1 { background: var(--c1); } .tile.s2 { background: var(--c2); }

  /* vouw met richel die het licht vangt (licht linksboven) */
  .tile::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit; pointer-events: none; z-index: 1;
    background: linear-gradient(135deg,
      rgba(255,255,255,0.24) 0%,
      rgba(255,255,255,0.10) 46.5%,
      rgba(255,255,255,0.60) 49.3%,
      rgba(0,0,0,0.045) 50.3%,
      rgba(0,0,0,0.12) 54%,
      rgba(0,0,0,0.17) 100%);
  }
  /* fijne papiertextuur op de chip */
  .tile::after {
    content: ""; position: absolute; inset: 0; border-radius: inherit; pointer-events: none; z-index: 2;
    opacity: 0.07; mix-blend-mode: multiply;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'><filter id='t'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='80' height='80' filter='url(%23t)' opacity='0.6'/></svg>");
  }
  .tile .g {
    font-size: clamp(12px,4.4vw,18px); color: var(--glyph); opacity: 0;
    transition: opacity 0.25s ease; text-shadow: 0 1px 2px rgba(20,30,25,0.35);
    pointer-events: none; z-index: 3; position: relative; font-weight: 700;
  }
  .show-glyph .tile .g { opacity: 1; }

  /* entree, tik, ripple */
  .tile.enter { animation: enterTile 0.5s cubic-bezier(0.22,0.61,0.36,1) both; }
  @keyframes enterTile { 0%{opacity:0; transform: translateY(12px) scale(0.9)} 100%{opacity:1; transform: translateY(0) scale(1)} }

  .tile.pop { z-index: 6; animation: tap 0.46s cubic-bezier(0.34,1.5,0.64,1); }
  @keyframes tap {
    0%   { transform: perspective(360px) rotateX(0) scale(1) translateY(0); }
    20%  { transform: perspective(360px) rotateX(0) scale(0.92) translateY(2px); }
    55%  { transform: perspective(360px) rotateX(38deg) scale(1.05) translateY(-3px); }
    100% { transform: perspective(360px) rotateX(0) scale(1) translateY(0); }
  }
  .tile.ripple { animation: lift 0.42s ease; }
  @keyframes lift { 0%{transform: translateY(0) scale(1)} 45%{transform: translateY(-3px) scale(1.03)} 100%{transform: translateY(0) scale(1)} }

  .tile.wave { animation: wave 0.7s ease; }
  @keyframes wave { 0%{transform: translateY(0) scale(1)} 40%{transform: translateY(-6px) scale(1.06)} 100%{transform: translateY(0) scale(1)} }

  /* ---- status onder bord ---- */
  .status { display: flex; align-items: center; justify-content: center; gap: 30px; margin-top: 30px; }
  .stat { text-align: center; }
  .stat .k { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 5px; }
  .stat .v { font-family: var(--mono); font-size: 26px; font-weight: 700; line-height: 1; letter-spacing: -0.01em; }
  .stat .v.par { color: var(--accent); }
  .status .sep { width: 1px; height: 30px; background: var(--line); }

  .foot { display: flex; justify-content: center; margin-top: 22px; }
  .textbtn {
    font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); background: none; border: none; cursor: pointer; padding: 8px 12px; transition: color 0.2s ease;
  }
  .textbtn:active { color: var(--ink); }

  /* ---- win ---- */
  .win {
    position: fixed; left: 50%; bottom: 24px; transform: translate(-50%, 160%);
    width: min(380px, calc(100vw - 44px));
    background: linear-gradient(180deg, #F6EEDB, #EFE4CC);
    border-radius: 20px; padding: 22px 22px 20px;
    box-shadow: 0 20px 50px rgba(var(--sh),0.34), inset 0 1px 0 rgba(255,255,255,0.7);
    opacity: 0; transition: transform 0.5s cubic-bezier(0.22,0.61,0.36,1), opacity 0.3s ease;
    pointer-events: none; z-index: 40;
  }
  .win.show { transform: translate(-50%, 0); opacity: 1; pointer-events: auto; }
  .win h3 { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 3px; }
  .win p { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  .win .share { display: flex; gap: 6px; margin-bottom: 18px; }
  .win .share i { width: 22px; height: 22px; border-radius: 5px; display: block; position: relative; overflow: hidden;
    box-shadow: 0 3px 5px -1px rgba(var(--sh),0.28), inset 1px 1px 0 rgba(255,255,255,0.3); }
  .win .share i::before { content:""; position:absolute; inset:0;
    background: linear-gradient(135deg, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0.55) 49.3%, rgba(0,0,0,0.06) 50.4%, rgba(0,0,0,0.15) 100%); }
  .win .close {
    font-family: var(--mono); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    color: #fff; background: var(--accent); border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%;
    position: relative; overflow: hidden;
    box-shadow: 0 6px 12px -2px rgba(var(--sh),0.30);
  }
  .win .close::before { content:""; position:absolute; inset:0; pointer-events:none;
    background: linear-gradient(135deg, rgba(255,255,255,0.24) 0 49.3%, rgba(0,0,0,0.10) 50.4% 100%); }

  @media (prefers-reduced-motion: reduce) {
    .tile, .win { transition-duration: 0.01ms !important; }
    .tile.enter, .tile.pop, .tile.ripple, .tile.wave { animation: none !important; opacity: 1 !important; }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="wordmark">FLUX<span class="dot">.</span></div>
      <button class="icon" id="a11yBtn" aria-pressed="false" aria-label="Symbolen aan of uit"><i></i><i></i><i></i></button>
    </div>

    <div class="subhead">Dagelijks &middot; 02 juli</div>
    <div class="goalline">
      <span class="t">Naar één kleur</span>
      <span class="sw"><span class="g" style="opacity:0"></span></span>
    </div>

    <div class="stage">
      <div class="board-wrap">
        <div class="board" id="board"></div>
      </div>
    </div>

    <div class="status">
      <div class="stat"><span class="k">Zetten</span><span class="v" id="moves">00</span></div>
      <div class="sep"></div>
      <div class="stat"><span class="k">Par</span><span class="v par" id="par">05</span></div>
    </div>

    <div class="foot">
      <button class="textbtn" id="resetBtn">Opnieuw</button>
    </div>
  </div>

  <div class="win" id="win">
    <h3 id="winTitle">Opgelost</h3>
    <p id="winSub">in 5 zetten, op par</p>
    <div class="share" id="winShare"></div>
    <button class="close" id="winClose">Volgende puzzel</button>
  </div>

<script>
(function(){
  const SIZE = 5, STATES = 3, TARGET = 0;
  const glyphs = ["\u25B2","\u25CF","\u25A0"];
  const board = document.getElementById("board");
  const body = document.body;
  const movesEl = document.getElementById("moves");
  const parEl = document.getElementById("par");
  const win = document.getElementById("win");
  const pad = n => String(n).padStart(2,"0");

  let state = new Array(SIZE*SIZE).fill(0);
  let start = state.slice();
  let moves = 0, par = 5, locked = false;

  const tiles = [];
  for (let i=0;i<SIZE*SIZE;i++){
    const t = document.createElement("button");
    t.className = "tile s0";
    t.setAttribute("aria-label","tegel "+(i+1));
    const g = document.createElement("span"); g.className = "g";
    t.appendChild(g);
    t.addEventListener("click", ()=>tap(i));
    board.appendChild(t); tiles.push(t);
  }

  function neighbors(i){
    const r = Math.floor(i/SIZE), c = i%SIZE, out = [i];
    if (r>0) out.push(i-SIZE); if (r<SIZE-1) out.push(i+SIZE);
    if (c>0) out.push(i-1); if (c<SIZE-1) out.push(i+1);
    return out;
  }
  function paint(i, animate, isSource){
    const t = tiles[i];
    const keep = t.classList.contains("enter") ? "" : "";
    t.className = "tile s"+state[i];
    t.querySelector(".g").textContent = glyphs[state[i]];
    if (animate){
      void t.offsetWidth;
      t.classList.add(isSource ? "pop" : "ripple");
      setTimeout(()=>t.classList.remove("pop","ripple"), 480);
    }
  }
  function renderAll(){ for(let i=0;i<state.length;i++){ tiles[i].className = "tile s"+state[i]; tiles[i].querySelector(".g").textContent = glyphs[state[i]]; } }

  function tap(i){
    if (locked) return;
    const aff = neighbors(i);
    aff.forEach(j => state[j] = (state[j]+1)%STATES);
    aff.forEach(j => paint(j, true, j===i));
    moves++; movesEl.textContent = pad(moves);
    if (navigator.vibrate) navigator.vibrate(9);
    if (state.every(v => v===TARGET)) showWin();
  }

  function scramble(entrance){
    do {
      state = new Array(SIZE*SIZE).fill(0);
      const k = 5 + Math.floor(Math.random()*2);
      const used = new Set();
      while (used.size < k) used.add(Math.floor(Math.random()*SIZE*SIZE));
      used.forEach(idx => neighbors(idx).forEach(j => state[j]=(state[j]+1)%STATES));
      par = k;
    } while (state.every(v => v===TARGET));
    start = state.slice();
    moves = 0; movesEl.textContent = "00"; parEl.textContent = pad(par);
    renderAll(); hideWin();
    if (entrance){
      tiles.forEach((t,i)=>{
        const r = Math.floor(i/SIZE), c = i%SIZE;
        t.classList.add("enter");
        t.style.animationDelay = ((r+c)*38)+"ms";
        t.addEventListener("animationend", ()=>{ t.classList.remove("enter"); t.style.animationDelay=""; }, {once:true});
      });
    }
  }
  function reset(){ state = start.slice(); moves = 0; movesEl.textContent = "00"; renderAll(); hideWin(); }

  function showWin(){
    locked = true;
    tiles.forEach((t,i)=>{ const r=Math.floor(i/SIZE),c=i%SIZE; t.style.animationDelay=((r+c)*45)+"ms"; t.classList.add("wave"); setTimeout(()=>{t.classList.remove("wave");t.style.animationDelay="";}, 800+(r+c)*45); });
    const onpar = moves <= par;
    document.getElementById("winSub").textContent = "in " + moves + " zetten" + (onpar ? ", op par" : "");
    const share = document.getElementById("winShare"); share.innerHTML = "";
    const cols = ["var(--c0)","var(--c1)","var(--c2)"];
    for (let n=0;n<5;n++){ const el = document.createElement("i"); el.style.background = cols[Math.floor(Math.random()*3)]; share.appendChild(el); }
    setTimeout(()=>win.classList.add("show"), 520);
  }
  function hideWin(){ win.classList.remove("show"); locked = false; }

  const a11yBtn = document.getElementById("a11yBtn");
  a11yBtn.addEventListener("click", ()=>{ const on = body.classList.toggle("show-glyph"); a11yBtn.setAttribute("aria-pressed", on?"true":"false"); });
  document.getElementById("resetBtn").addEventListener("click", reset);
  document.getElementById("winClose").addEventListener("click", ()=>scramble(true));

  scramble(true);
})();
</script>
</body>
</html>
