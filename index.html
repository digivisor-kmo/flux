<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FLUX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --ink: #2A2118;
    --muted: #A2947A;
    --line: rgba(42,33,24,0.14);
    --c0: #2E9E90; --c1: #F0654A; --c2: #F3B43A;   /* getunede, warm-belichte triade */
    --accent: #F0654A;
    --glyph: rgba(255,255,255,0.94);
    --sh: 74,52,30;   /* warme schaduwtint */
    --font: "Bricolage Grotesque", system-ui, sans-serif;
    --mono: "Space Mono", ui-monospace, monospace;
  }

  html, body { height: 100%; }
  body {
    color: var(--ink);
    font-family: var(--font);
    display: flex; justify-content: center; min-height: 100dvh;
    overflow-x: hidden; position: relative;
    /* verlicht papieroppervlak: warme lichtbron linksboven */
    background:
      radial-gradient(120% 85% at 26% 8%, #F5EDDA 0%, #ECE1C9 44%, #E3D6B9 76%, #D9C9A9 100%);
  }
  /* papierkorrel */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.55;
    mix-blend-mode: multiply;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='p'><feTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='2'/></filter><rect width='200' height='200' filter='url(%23p)' opacity='0.05'/></svg>");
  }
  /* zachte vignet */
  body::after {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(130% 100% at 50% 40%, transparent 55%, rgba(60,44,24,0.10) 100%);
  }

  .app {
    width: 100%; max-width: 420px; z-index: 1; position: relative;
    padding: 22px 26px 30px;
    display: flex; flex-direction: column; min-height: 100dvh;
  }

  /* ---- top bar (rustig) ---- */
  .topbar { display: flex; align-items: center; justify-content: space-between; }
  .wordmark { font-weight: 800; font-size: 21px; letter-spacing: -0.03em; }
  .wordmark .dot { color: var(--accent); }
  .icon {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; gap: 2px;
    background: rgba(255,255,255,0.35);
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow: 0 2px 5px rgba(var(--sh),0.14), inset 0 1px 0 rgba(255,255,255,0.7);
    cursor: pointer; transition: transform 0.18s ease;
  }
  .icon:active { transform: scale(0.94); }
  .icon i { width: 5px; height: 5px; display: block; background: var(--muted); }
  .icon i:nth-child(1) { clip-path: polygon(50% 0, 100% 100%, 0 100%); }
  .icon i:nth-child(2) { border-radius: 50%; }
  .icon i:nth-child(3) { border-radius: 1px; }
  .show-glyph .icon { background: var(--ink); border-color: var(--ink); }
  .show-glyph .icon i { background: #F0E7D4; }

  /* ---- subhead ---- */
  .subhead {
    text-align: center; font-family: var(--mono); font-size: 10.5px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
    margin-top: 26px;
  }
  .goalline {
    text-align: center; margin-top: 10px; margin-bottom: 4px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .goalline .t { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  .goalline .sw {
    width: 18px; height: 18px; border-radius: 4px; background: var(--c0); position: relative; overflow: hidden;
    box-shadow: 0 2px 3px rgba(var(--sh),0.28), inset 1px 1px 0 rgba(255,255,255,0.3);
  }
  .goalline .sw::before { content:""; position:absolute; inset:0;
    background: linear-gradient(135deg, rgba(255,255,255,0.30) 0%, rgba(255,255,255,0.55) 49.4%, rgba(0,0,0,0.06) 50.4%, rgba(0,0,0,0.15) 100%); }

  /* ---- moeilijkheid (rustige pillen) ---- */
  .diffs { display: flex; justify-content: center; gap: 6px; margin-top: 14px; }
  .diffs button {
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); background: rgba(255,255,255,0.30);
    border: 1px solid rgba(255,255,255,0.55); border-radius: 999px;
    padding: 7px 13px; cursor: pointer;
    box-shadow: 0 2px 4px rgba(var(--sh),0.10), inset 0 1px 0 rgba(255,255,255,0.6);
    transition: transform 0.15s ease, background-color 0.2s ease, color 0.2s ease;
  }
  .diffs button:active { transform: scale(0.95); }
  .diffs button.on {
    color: #F0E7D4; background: var(--ink); border-color: var(--ink);
    box-shadow: 0 3px 6px rgba(var(--sh),0.24);
  }

  /* ---- board (held) ---- */
  .stage { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
  .board-wrap { position: relative; width: 100%; }
  /* grondschaduw onder het bord */
  .board-wrap::before {
    content: ""; position: absolute; left: 8%; right: 8%; bottom: -14px; height: 44px;
    background: radial-gradient(50% 100% at 50% 0, rgba(var(--sh),0.20), transparent 72%);
    filter: blur(4px);
  }
  .board { display: grid; gap: 13px; aspect-ratio: 1; position: relative; perspective: 900px; }
  .board.n3 { gap: 18px; }
  .board.n4 { gap: 15px; }

  .tile {
    aspect-ratio: 1; border-radius: 7%; border: none; cursor: pointer;
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    transform-origin: center;
    box-shadow:
      0 9px 15px -5px rgba(var(--sh),0.32),
      0 3px 5px -1px rgba(var(--sh),0.22),
      inset 1.5px 1.5px 0 rgba(255,255,255,0.32),
      inset -1.5px -1.5px 0 rgba(0,0,0,0.10);
    transition: background-color 0.30s cubic-bezier(0.22,0.61,0.36,1);
    will-change: transform;
  }
  .tile:focus-visible { outline: 3px solid var(--ink); outline-offset: 3px; }
  .tile.s0 { background: var(--c0); } .tile.s1 { background: var(--c1); } .tile.s2 { background: var(--c2); }

  /* vouw met richel die het licht vangt (licht linksboven) */
  .tile::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit; pointer-events: none; z-index: 1;
    background: linear-gradient(135deg,
      rgba(255,255,255,0.24) 0%,
      rgba(255,255,255,0.10) 46.5%,
      rgba(255,255,255,0.60) 49.3%,
      rgba(0,0,0,0.045) 50.3%,
      rgba(0,0,0,0.12) 54%,
      rgba(0,0,0,0.17) 100%);
  }
  /* fijne papiertextuur op de chip */
  .tile::after {
    content: ""; position: absolute; inset: 0; border-radius: inherit; pointer-events: none; z-index: 2;
    opacity: 0.07; mix-blend-mode: multiply;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'><filter id='t'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='80' height='80' filter='url(%23t)' opacity='0.6'/></svg>");
  }
  .tile .g {
    font-size: clamp(12px,4.4vw,18px); color: var(--glyph); opacity: 0;
    transition: opacity 0.25s ease; text-shadow: 0 1px 2px rgba(20,30,25,0.35);
    pointer-events: none; z-index: 3; position: relative; font-weight: 700;
  }
  .board.n3 .tile .g { font-size: clamp(20px,8vw,32px); }
  .board.n4 .tile .g { font-size: clamp(16px,6vw,24px); }
  .show-glyph .tile .g { opacity: 1; }

  /* entree: diagonale vouw-golf */
  .tile.enter { animation: enterTile 0.55s cubic-bezier(0.22,0.61,0.36,1) both; }
  @keyframes enterTile {
    0%   { opacity: 0; transform: perspective(500px) rotateX(-58deg) translateY(14px) scale(0.86); }
    70%  { opacity: 1; }
    100% { opacity: 1; transform: perspective(500px) rotateX(0) translateY(0) scale(1); }
  }

  /* tik: indrukken, dan omklappen; buren liften mee */
  .tile.pop { z-index: 6; animation: tap 0.46s cubic-bezier(0.34,1.5,0.64,1); }
  @keyframes tap {
    0%   { transform: perspective(360px) rotateX(0) scale(1) translateY(0); }
    20%  { transform: perspective(360px) rotateX(0) scale(0.92) translateY(2px); }
    55%  { transform: perspective(360px) rotateX(38deg) scale(1.05) translateY(-3px); }
    100% { transform: perspective(360px) rotateX(0) scale(1) translateY(0); }
  }
  .tile.ripple { animation: lift 0.42s ease; }
  @keyframes lift { 0%{transform: translateY(0) scale(1)} 45%{transform: translateY(-3px) scale(1.03)} 100%{transform: translateY(0) scale(1)} }

  .tile.wave { animation: wave 0.7s ease; }
  @keyframes wave { 0%{transform: translateY(0) scale(1)} 40%{transform: translateY(-6px) scale(1.06)} 100%{transform: translateY(0) scale(1)} }

  /* hint: zachte adem-puls + inktring op de aan te tikken tegel */
  .tile.hint { z-index: 5; animation: hintPulse 1.15s ease-in-out infinite; outline: 3px solid var(--ink); outline-offset: 3px; }
  @keyframes hintPulse {
    0%, 100% { transform: translateY(0) scale(1); }
    50%      { transform: translateY(-3px) scale(1.05); }
  }

  /* ---- status onder bord ---- */
  .status { display: flex; align-items: center; justify-content: center; gap: 26px; margin-top: 30px; }
  .stat { text-align: center; min-width: 62px; }
  .stat .k { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 5px; }
  .stat .v { font-family: var(--mono); font-size: 26px; font-weight: 700; line-height: 1; letter-spacing: -0.01em; }
  .stat .v.par { color: var(--accent); }
  .stat .v.time { font-size: 20px; padding-top: 4px; }
  .status .sep { width: 1px; height: 30px; background: var(--line); }

  .foot { display: flex; justify-content: center; gap: 8px; margin-top: 22px; }
  .textbtn {
    font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); background: none; border: none; cursor: pointer; padding: 8px 12px; transition: color 0.2s ease;
  }
  .textbtn:active { color: var(--ink); }

  /* ---- win ---- */
  .win {
    position: fixed; left: 50%; bottom: 24px; transform: translate(-50%, 160%);
    width: min(380px, calc(100vw - 44px));
    background: linear-gradient(180deg, #F6EEDB, #EFE4CC);
    border-radius: 20px; padding: 22px 22px 20px;
    box-shadow: 0 20px 50px rgba(var(--sh),0.34), inset 0 1px 0 rgba(255,255,255,0.7);
    opacity: 0; transition: transform 0.5s cubic-bezier(0.22,0.61,0.36,1), opacity 0.3s ease;
    pointer-events: none; z-index: 40;
  }
  .win.show { transform: translate(-50%, 0); opacity: 1; pointer-events: auto; }
  .win h3 { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 3px; }
  .win p { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  /* mini-grid deelbeeld: startpatroon, spoilt de oplossing niet */
  .win .share { display: grid; gap: 4px; margin-bottom: 18px; }
  .win .share i { width: 15px; height: 15px; border-radius: 4px; display: block; position: relative; overflow: hidden;
    box-shadow: 0 2px 4px -1px rgba(var(--sh),0.28), inset 1px 1px 0 rgba(255,255,255,0.3); }
  .win .share i::before { content:""; position:absolute; inset:0;
    background: linear-gradient(135deg, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0.55) 49.3%, rgba(0,0,0,0.06) 50.4%, rgba(0,0,0,0.15) 100%); }
  .win .close {
    font-family: var(--mono); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    color: #fff; background: var(--accent); border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%;
    position: relative; overflow: hidden;
    box-shadow: 0 6px 12px -2px rgba(var(--sh),0.30);
  }
  .win .close::before { content:""; position:absolute; inset:0; pointer-events:none;
    background: linear-gradient(135deg, rgba(255,255,255,0.24) 0 49.3%, rgba(0,0,0,0.10) 50.4% 100%); }

  @media (prefers-reduced-motion: reduce) {
    .tile, .win { transition-duration: 0.01ms !important; }
    .tile.enter, .tile.pop, .tile.ripple, .tile.wave { animation: none !important; opacity: 1 !important; }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="wordmark" id="wordmark"></div>
      <button class="icon" id="a11yBtn" aria-pressed="false" aria-label="Symbolen aan of uit"><i></i><i></i><i></i></button>
    </div>

    <div class="subhead" id="subhead"></div>
    <div class="goalline">
      <span class="t">Naar één kleur</span>
      <span class="sw"></span>
    </div>

    <div class="diffs" id="diffs" role="radiogroup" aria-label="Moeilijkheid"></div>

    <div class="stage">
      <div class="board-wrap">
        <div class="board" id="board"></div>
      </div>
    </div>

    <div class="status">
      <div class="stat"><span class="k">Zetten</span><span class="v" id="moves">00</span></div>
      <div class="sep"></div>
      <div class="stat"><span class="k">Par</span><span class="v par" id="par">00</span></div>
      <div class="sep"></div>

    <div class="foot">
      <button class="textbtn" id="resetBtn">Opnieuw</button>
      <button class="textbtn" id="hintBtn">Hint</button>
      <button class="textbtn" id="newBtn">Nieuwe puzzel</button>
    </div>
  </div>

  <div class="win" id="win" role="dialog" aria-labelledby="winTitle">
    <h3 id="winTitle">Opgelost</h3>
    <p id="winSub"></p>
    <div class="share" id="winShare" aria-hidden="true"></div>
    <button class="close" id="winClose">Volgende puzzel</button>
  </div>

<script>
/**
 * Pure spellogica-module — geen DOM, geen framework.
 * Exacte mechaniek volgens sectie 2 van de projectinstructie.
 * De transformatie is lineair over Z/S: raak deze regels niet aan
 * zonder expliciete beslissing (fundament voor solver + leaderboards).
 *
 * In fase B verhuist dit naar een eigen bestand/module, gedeeld
 * tussen client en server.
 */
const FluxCore = (function () {
  "use strict";

  /** Indexen die één tik beïnvloedt: de tegel zelf + orthogonale buren (plus-kwast, geen wrap). */
  function brush(i, size) {
    const r = Math.floor(i / size), c = i % size, out = [i];
    if (r > 0) out.push(i - size);
    if (r < size - 1) out.push(i + size);
    if (c > 0) out.push(i - 1);
    if (c < size - 1) out.push(i + 1);
    return out;
  }

  /** Past één tik toe op tegel i. Muteert state. */
  function applyTap(state, i, size, states) {
    const aff = brush(i, size);
    for (const j of aff) state[j] = (state[j] + 1) % states;
    return aff;
  }

  function createSolved(size, target) {
    return new Array(size * size).fill(target);
  }

  function isSolved(state, target) {
    return state.every(v => v === target);
  }

  /**
   * Genereert een puzzel vanaf de opgeloste staat door k tikken op
   * verschillende tegels. Gegarandeerd oplosbaar; de k tikken vormen
   * zelf een oplossing van k zetten (volgorde-onafhankelijk), dus k
   * is een bewezen bovengrens. Echte par volgt in fase B (solver).
   * rng: functie die [0,1) teruggeeft (injecteerbaar voor tests/daily).
   */
  function generate(size, states, target, k, rng) {
    rng = rng || Math.random;
    let state, taps;
    do {
      state = createSolved(size, target);
      const used = new Set();
      while (used.size < k) used.add(Math.floor(rng() * size * size));
      taps = [...used];
      for (const i of taps) applyTap(state, i, size, states);
    } while (isSolved(state, target));
    return { state, taps, par: k };
  }

  return { brush, applyTap, createSolved, isSolved, generate };
})();
if (typeof module !== "undefined") module.exports = FluxCore;
</script>
<!-- CORE-END -->

<script>
(function(){
  "use strict";

  /* ---- config (naam is placeholder, bewust één variabele) ---- */
  const GAME_NAME = "FLUX";
  const TARGET = 0;
  const glyphs = ["▲","●","■"];

  /* Moeilijkheid schaalt via de knoppen uit sectie 4:
     rastergrootte, aantal staten en scramble-lengte. Zelfde regel, andere knoppen. */
  const DIFFS = {
    makkelijk: { label: "Makkelijk", size: 3, states: 2, kMin: 2, kMax: 3 },
    medium:    { label: "Medium",    size: 4, states: 3, kMin: 3, kMax: 4 },
    moeilijk:  { label: "Moeilijk",  size: 5, states: 3, kMin: 5, kMax: 7 }
  };
  let diffKey = "makkelijk";
  try { const s = localStorage.getItem("flux-diff"); if (DIFFS[s]) diffKey = s; } catch(e){}
  const diff = () => DIFFS[diffKey];

  document.title = GAME_NAME;
  document.getElementById("wordmark").innerHTML =
    GAME_NAME + '<span class="dot">.</span>';
  document.getElementById("subhead").textContent =
    "Puzzel · " + new Date().toLocaleDateString("nl-BE", { day: "2-digit", month: "long" });

  const board = document.getElementById("board");
  const body = document.body;
  const movesEl = document.getElementById("moves");
  const parEl = document.getElementById("par");
  const timeEl = document.getElementById("time");
  const win = document.getElementById("win");
  const pad = n => String(n).padStart(2,"0");

  let state = [], start = [];
  let moves = 0, par = 0, locked = false;
  let tiles = [];
  /* needed[i] = aantal tikken dat tegel i nog nodig heeft (mod S) om op te
     lossen. Volgt uit de generator-tikken en beweegt mee met elke spelertik —
     kan dankzij de lineariteit van de mechaniek (sectie 2). */
  let needed = [], neededStart = [], hintsUsed = 0;

  /* ---- timer: start bij eerste tik ---- */
  let t0 = null, timerId = null, elapsed = 0;
  function fmtTime(ms){ const s = Math.floor(ms/1000); return pad(Math.floor(s/60)) + ":" + pad(s%60); }
  function startTimer(){
    if (t0 !== null) return;
    t0 = Date.now();
    timerId = setInterval(()=>{ timeEl.textContent = fmtTime(Date.now()-t0); }, 250);
  }
  function stopTimer(){ if (timerId) clearInterval(timerId); timerId = null; elapsed = t0 ? Date.now()-t0 : 0; }
  function resetTimer(){ stopTimer(); t0 = null; elapsed = 0; timeEl.textContent = "00:00"; }

  /* ---- bord (her)opbouwen bij moeilijkheidswissel ---- */
  function buildBoard(){
    const size = diff().size;
    board.innerHTML = ""; tiles = [];
    board.className = "board n" + size;
    board.style.gridTemplateColumns = "repeat(" + size + ", 1fr)";
    for (let i=0;i<size*size;i++){
      const t = document.createElement("button");
      t.className = "tile s0";
      t.setAttribute("aria-label","tegel "+(i+1));
      const g = document.createElement("span"); g.className = "g";
      t.appendChild(g);
      t.addEventListener("click", ()=>tap(i));
      board.appendChild(t); tiles.push(t);
    }
  }

  function paint(i, animate, isSource){
    const t = tiles[i];
    t.className = "tile s"+state[i];
    t.querySelector(".g").textContent = glyphs[state[i]];
    if (animate){
      void t.offsetWidth;
      t.classList.add(isSource ? "pop" : "ripple");
      setTimeout(()=>t.classList.remove("pop","ripple"), 480);
    }
  }
  function renderAll(){ for(let i=0;i<state.length;i++) paint(i,false,false); }

  function tap(i){
    if (locked) return;
    startTimer();
    const d = diff();
    const aff = FluxCore.applyTap(state, i, d.size, d.states);
    needed[i] = (needed[i] - 1 + d.states) % d.states;
    clearHint();
    aff.forEach(j => paint(j, true, j===i));
    moves++; movesEl.textContent = pad(moves);
    if (navigator.vibrate) navigator.vibrate(9);
    if (FluxCore.isSolved(state, TARGET)) showWin();
  }

  /* ---- hint: licht een tegel op die aantoonbaar richting oplossing gaat ---- */
  let hintTile = -1;
  function clearHint(){
    if (hintTile >= 0 && tiles[hintTile]) tiles[hintTile].classList.remove("hint");
    hintTile = -1;
  }
  function showHint(){
    if (locked) return;
    clearHint();
    /* kies de tegel met de meeste resterende tikken: minste kans op verwarring */
    let best = -1;
    for (let i=0;i<needed.length;i++){
      if (needed[i] > 0 && (best < 0 || needed[i] > needed[best])) best = i;
    }
    if (best < 0) return; /* al opgelost */
    hintTile = best;
    tiles[best].classList.add("hint");
    hintsUsed++;
  }

  function entrance(){
    const size = diff().size;
    tiles.forEach((t,i)=>{
      const r = Math.floor(i/size), c = i%size;
      t.classList.add("enter");
      t.style.animationDelay = ((r+c)*38)+"ms";
      t.addEventListener("animationend", ()=>{ t.classList.remove("enter"); t.style.animationDelay=""; }, {once:true});
    });
  }

  function newPuzzle(withEntrance){
    const d = diff();
    const k = d.kMin + Math.floor(Math.random()*(d.kMax-d.kMin+1));
    const p = FluxCore.generate(d.size, d.states, TARGET, k);
    state = p.state; start = state.slice(); par = p.par;
    needed = new Array(d.size*d.size).fill(0);
    p.taps.forEach(i => needed[i] = d.states - 1);
    neededStart = needed.slice();
    hintsUsed = 0; clearHint();
    moves = 0; movesEl.textContent = "00"; parEl.textContent = pad(par);
    resetTimer(); renderAll(); hideWin();
    if (withEntrance) entrance();
  }

  function reset(){
    state = start.slice();
    needed = neededStart.slice();
    hintsUsed = 0; clearHint();
    moves = 0; movesEl.textContent = "00";
    resetTimer(); renderAll(); hideWin();
  }

  /* ---- moeilijkheidskiezer ---- */
  const diffsEl = document.getElementById("diffs");
  Object.keys(DIFFS).forEach(key => {
    const b = document.createElement("button");
    b.textContent = DIFFS[key].label;
    b.dataset.key = key;
    b.setAttribute("role","radio");
    b.addEventListener("click", ()=>{
      if (diffKey === key) return;
      diffKey = key;
      try { localStorage.setItem("flux-diff", key); } catch(e){}
      paintDiffs();
      buildBoard();
      newPuzzle(true);
    });
    diffsEl.appendChild(b);
  });
  function paintDiffs(){
    diffsEl.querySelectorAll("button").forEach(b => {
      const on = b.dataset.key === diffKey;
      b.classList.toggle("on", on);
      b.setAttribute("aria-checked", on ? "true" : "false");
    });
  }

  /* ---- win ---- */
  function showWin(){
    locked = true;
    stopTimer();
    const size = diff().size;
    tiles.forEach((t,i)=>{
      const r=Math.floor(i/size), c=i%size;
      t.style.animationDelay=((r+c)*45)+"ms";
      t.classList.add("wave");
      setTimeout(()=>{t.classList.remove("wave");t.style.animationDelay="";}, 800+(r+c)*45);
    });
    clearHint();
    const onpar = moves <= par;
    document.getElementById("winSub").textContent =
      diff().label + " · in " + moves + " zetten · par " + par + " · " + fmtTime(elapsed)
      + (onpar ? " · op par" : "")
      + (hintsUsed > 0 ? " · " + hintsUsed + (hintsUsed === 1 ? " hint" : " hints") : "");
    /* mini-grid = startpatroon: deelbaar zonder de oplossing te spoilen */
    const share = document.getElementById("winShare"); share.innerHTML = "";
    share.style.gridTemplateColumns = "repeat(" + size + ", 15px)";
    const cols = ["var(--c0)","var(--c1)","var(--c2)"];
    for (let n=0;n<start.length;n++){
      const el = document.createElement("i");
      el.style.background = cols[start[n]];
      share.appendChild(el);
    }
    setTimeout(()=>win.classList.add("show"), 520);
  }
  function hideWin(){ win.classList.remove("show"); locked = false; }

  /* ---- symbolen-toggle (kleur nooit enige drager van staat) ---- */
  const a11yBtn = document.getElementById("a11yBtn");
  function setGlyphs(on){
    body.classList.toggle("show-glyph", on);
    a11yBtn.setAttribute("aria-pressed", on ? "true" : "false");
    try { localStorage.setItem("flux-glyphs", on ? "1" : "0"); } catch(e){}
  }
  a11yBtn.addEventListener("click", ()=> setGlyphs(!body.classList.contains("show-glyph")));
  try { if (localStorage.getItem("flux-glyphs") === "1") setGlyphs(true); } catch(e){}

  document.getElementById("resetBtn").addEventListener("click", reset);
  document.getElementById("hintBtn").addEventListener("click", showHint);
  document.getElementById("newBtn").addEventListener("click", ()=>newPuzzle(true));
  document.getElementById("winClose").addEventListener("click", ()=>newPuzzle(true));

  paintDiffs();
  buildBoard();
  newPuzzle(true);
})();
</script>
</body>
</html>
